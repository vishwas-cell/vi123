<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App - Vishwas N Bhagavantanavar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .todo-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .task-item {
            transition: all 0.3s ease;
        }
        .task-item:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="todo-container p-4">
                    <h1 class="text-center mb-4" style="color: #667eea; font-weight: bold;">To-Do List App</h1>
                    <p class="text-center text-muted mb-4">Built with HTML, CSS, Bootstrap & JavaScript</p>

                    <div class="input-group mb-3">
                        <input type="text" id="taskInput" class="form-control" placeholder="Add a new task...">
                        <button class="btn btn-primary" onclick="addTask()">Add Task</button>
                    </div>

                    <ul id="taskList" class="list-group">
                        <!-- Tasks will be added here -->
                    </ul>

                    <div class="mt-3 text-center">
                        <small class="text-muted">Tasks are saved in your browser's localStorage</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load tasks from localStorage
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        function renderTasks() {
            const taskList = document.getElementById('taskList');
            taskList.innerHTML = '';

            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = 'list-group-item d-flex justify-content-between align-items-center task-item';
                li.innerHTML = `
                    <span class="${task.completed ? 'text-decoration-line-through text-muted' : ''}">${task.text}</span>
                    <div>
                        <button class="btn btn-sm btn-success me-2" onclick="toggleTask(${index})">
                            ${task.completed ? 'Undo' : 'Complete'}
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteTask(${index})">Delete</button>
                    </div>
                `;
                taskList.appendChild(li);
            });
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();

            if (text) {
                tasks.push({ text, completed: false });
                input.value = '';
                saveTasks();
                renderTasks();
            }
        }

        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            saveTasks();
            renderTasks();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            saveTasks();
            renderTasks();
        }

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        // Allow Enter key to add tasks
        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        // Initial render
        renderTasks();
    </script>
</body>
</html>
